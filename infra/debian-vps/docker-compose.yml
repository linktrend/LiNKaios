services:
  LiNKaios:
    image: node:22-alpine
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "npm install -g pnpm && pnpm install && pnpm --filter @linktrend/LiNKaios dev"
      ]
    env_file:
      - ${AIOS_ENV_FILE:-../../.env}
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/google/linktrend-gsm.json}
    ports:
      - "4000:4000"
    volumes:
      - ../../:/workspace
      - ../../linkbots/internal/managers:/workspace/linkbots/internal/managers:ro
      - ../../linkbots/internal/workers:/workspace/linkbots/internal/workers:ro
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH:-../../secrets/gcp-sa.json}:${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/google/linktrend-gsm.json}:ro
    depends_on:
      - LiNKautowork
      - nats

  LiNKautowork:
    image: n8nio/n8n:1.82.1
    env_file:
      - ${AIOS_ENV_FILE:-../../.env}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../apps/LiNKautowork/workflows:/workflows:ro

  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  agent-zero:
    image: agent0ai/agent-zero:latest
    profiles: ["upstreams"]
    ports:
      - "50001:80"
    restart: unless-stopped

  paperclip-upstream:
    image: node:22-alpine
    profiles: ["upstreams"]
    working_dir: /applets/link-paperclip
    command:
      [
        "sh",
        "-c",
        "npm install -g pnpm && pnpm install && pnpm dev:server"
      ]
    env_file:
      - ${AIOS_ENV_FILE:-../../.env}
    volumes:
      - ../../applets/link-paperclip:/applets/link-paperclip
    ports:
      - "3100:3100"

  openclaw-gateway:
    image: node:22-alpine
    profiles: ["upstreams"]
    working_dir: /applets/link-openclaw
    command:
      [
        "sh",
        "-c",
        "npm install -g pnpm && pnpm install && pnpm gateway:watch"
      ]
    env_file:
      - ${AIOS_ENV_FILE:-../../.env}
    volumes:
      - ../../applets/link-openclaw:/applets/link-openclaw
    ports:
      - "4141:4141"

  linkboard:
    image: node:22-alpine
    profiles: ["upstreams"]
    working_dir: /applets/link-llm-council
    command:
      [
        "sh",
        "-c",
        "npm install -g pnpm && pnpm install && pnpm dev"
      ]
    env_file:
      - ${AIOS_ENV_FILE:-../../.env}
    volumes:
      - ../../applets/link-llm-council:/applets/link-llm-council
    ports:
      - "3200:3200"

volumes:
  n8n_data:
